<!DOCTYPE html>
<html>
<head>
  <title>tiny</title>
  <style>
    body { font-family: sans-serif; margin: 10px; max-width: 300px; }
    table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    td, th { border: 1px solid #aaa; padding: 3px; font-size: 0.9rem; }
    .due { color: #c00; font-size: 0.8rem; }
    hr { margin: 8px 0; }
    h3, h4 { margin: 8px 0 2px; font-size: 1rem; }
    p { margin: 4px 0; font-size: 0.9rem; }
    a { font-size: 0.9rem; }
  </style>
</head>
<body>

<h3>tables</h3>
<h4>table 3</h4>
<table>
  <tr><th>fruit</th><th>color</th></tr>
  <tr><td>apple</td><td>red</td></tr>
  <tr><td>plum</td><td>purple</td></tr>
</table>

<p>• one<br>• two<br>• three</p>

<hr>
<small>due Nov 15</small>

</body>
</html>
